name: Base Checks

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  base-checks:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    env:
      ASTRO_TELEMETRY_DISABLED: 1
      NODE_ENV: staging

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        id: node
        with:
          node-version: 22.17.1

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Cache Yarn (Berry)
        uses: actions/cache@v5
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-node${{ steps.node.outputs.node-version }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node${{ steps.node.outputs.node-version }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable --inline-builds

      # --- Lint / Format  ---
      - name: ESLint (lint & format)
        if: ${{ hashFiles('eslint.config.*') != '' }}
        run: yarn lint:all

      # --- Type & Framework Checks ---
      - name: Astro check
        run: yarn astro check

      - name: TypeScript compile check
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: yarn tsc --noEmit
